<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña - Quiniela Conde</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="./recuperacion.css" />
</head>
<body>
  <main class="phone auth-page recovery-page">
    <div class="logo-wrap">
      <img class="logo-img" src="../../assets/img/logo.png" alt="Logo Quiniela Conde" />
    </div>

    <h1 class="page-title">Crear nueva contraseña</h1>

    <p class="page-copy">
      Establece una nueva contraseña para tu cuenta.
    </p>

    <form id="nuevaPasswordForm" class="auth-form recovery-form">
      <label class="field-block">
        <span class="field-label">Nueva contraseña</span>
        <span class="field field--with-trailing-icon">
          <span class="icon">🔒</span>
          <input id="password" type="password" placeholder="Nueva contraseña" />
          <button class="icon-button" id="togglePassword" type="button">👁️</button>
        </span>
      </label>

      <label class="field-block">
        <span class="field-label">Confirmar contraseña</span>
        <span class="field field--with-trailing-icon">
          <span class="icon">🔒</span>
          <input id="confirmPassword" type="password" placeholder="Confirmar contraseña" />
          <button class="icon-button" id="toggleConfirmPassword" type="button">👁️</button>
        </span>
      </label>

      <button class="submit submit--lg" type="submit">
        GUARDAR Y VOLVER AL INICIO
      </button>
    </form>

    <div class="login-link login-link--compact">
      <a href="./login.html">← Volver al inicio</a>
    </div>
  </main>

  <script type="module" src="../../js/main.js"></script>
  <script type="module" src="./nueva-password.js"></script>
</body>
</html>
